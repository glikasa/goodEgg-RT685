family: rt6xx                  # Family identifier for RT500/RT600
revision: a0                   # Silicon revision (usually a0 or a1 for RT685)
outputImageExecutionTarget: RAM # We are loading to RAM, not XIP
outputImageAuthenticationType: Plain # Plain (Unsigned), CRC, or Signed

# The Application Container
masterBootImage:
  images:
    - binaryFile: "build/zephyr/zephyr.bin" # Path to your clean Zephyr binary
      dstAddr: 0x1b000       # Destination Address in SRAM (Must match Linker!)
      entryPoint: 0x1b000    # Entry point (Reset_Handler location)
                                # For Cortex-M, usually same as Vector Table Start
