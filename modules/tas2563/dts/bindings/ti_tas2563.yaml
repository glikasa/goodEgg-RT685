description: |
  TAS2563 is Smart Audio amplifier from Texas instruments. 

compatible: "ti,tas2563"

include: base.yaml

properties:
  reset-gpios:
    type: phandle-array
    required: true
    description: Reset pin 
  int-gpios:
    type: phandle-array
    required: false
    description: Over current interrupt pin 
  audio-interface:
    type: phandle
    required: true
    description: Data-ready interrupt pin 

